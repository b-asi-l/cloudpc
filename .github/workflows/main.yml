      # 2. INSTALAR MESA3D (OpenGL SOFTWARE RENDERER)
      # ─────────────────────────────────────────────
      - name: Install Mesa3D OpenGL (Software GPU)
        run: |
          $mesaUrl = "https://github.com/pal1000/mesa-dist-win/releases/download/24.3.4/mesa3d-24.3.4-release-mingw.7z"
          $sevenZipUrl = "https://www.7-zip.org/a/7zr.exe"
          
          Invoke-WebRequest -Uri $sevenZipUrl -OutFile "$env:TEMP\7zr.exe" -UseBasicParsing
          
          Write-Host "Downloading Mesa3D..." -ForegroundColor Cyan
          Invoke-WebRequest -Uri $mesaUrl -OutFile "$env:TEMP\mesa3d.7z" -UseBasicParsing
          
          $mesaDir = "C:\mesa3d"
          New-Item -ItemType Directory -Force -Path $mesaDir | Out-Null
          & "$env:TEMP\7zr.exe" x "$env:TEMP\mesa3d.7z" -o"$mesaDir" -y | Out-Null
          
          $installScript = Get-ChildItem -Path $mesaDir -Filter "systemwidedeploy.cmd" -Recurse | Select-Object -First 1
          if ($installScript) {
            Write-Host "Installing Mesa3D system-wide..." -ForegroundColor Cyan
            & cmd /c "`"$($installScript.FullName)`" x64"
          } else {
            $x64dir = Get-ChildItem -Path $mesaDir -Filter "x64" -Recurse -Directory | Select-Object -First 1
            if ($x64dir) {
              Copy-Item "$($x64dir.FullName)\opengl32.dll" "C:\Windows\System32\" -Force
              Copy-Item "$($x64dir.FullName)\*.dll" "C:\Windows\System32\" -Force -ErrorAction SilentlyContinue
            }
          }
          
          $openglDll = Test-Path "C:\Windows\System32\opengl32.dll"
          Write-Host "OpenGL DLL present: $openglDll" -ForegroundColor Green
          
          $vcUrl = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          Invoke-WebRequest -Uri $vcUrl -OutFile "$env:TEMP\vc_redist.x64.exe" -UseBasicParsing
          Start-Process "$env:TEMP\vc_redist.x64.exe" -ArgumentList "/quiet", "/norestart" -Wait
          
          Write-Host "Mesa3D (software OpenGL) installed successfully" -ForegroundColor Green

      # ─────────────────────────────────────────────
      # 3. INSTALAR NODE.JS + NPM
      # ─────────────────────────────────────────────
      - name: Install Node.js LTS (with npm)
        run: |
          Write-Host "=== Installing Node.js LTS ===" -ForegroundColor Cyan
          $nodeUrl = "https://nodejs.org/dist/v22.15.0/node-v22.15.0-x64.msi"
          $installer = "$env:TEMP\nodejs_installer.msi"
          
          Invoke-WebRequest -Uri $nodeUrl -OutFile $installer -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installer`"", "/quiet", "/norestart", "ALLUSERS=1" -Wait
          
          # Refrescar PATH completo desde el registro
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "User")
          
          node --version
          npm --version
          Write-Host "Node.js + npm installed successfully" -ForegroundColor Green

      # ─────────────────────────────────────────────
      # 4. INSTALAR PYTHON + PIP
      # ─────────────────────────────────────────────
      - name: Install Python
        run: |
          Write-Host "=== Installing Python ===" -ForegroundColor Cyan
          $pythonUrl = "https://www.python.org/ftp/python/3.12.4/python-3.12.4-amd64.exe"
          $installer = "$env:TEMP\python_installer.exe"
          
          Invoke-WebRequest -Uri $pythonUrl -OutFile $installer -UseBasicParsing
          
          # Instalar Python: TODOS los usuarios, añadir al PATH, incluir pip, SIN alias de Windows Store
          Start-Process $installer -ArgumentList "/quiet", "InstallAllUsers=1", "PrependPath=1", "Include_pip=1", "Include_test=0", "Include_launcher=0" -Wait
          
          # Refrescar PATH desde el registro
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "User")
          
          # Desactivar alias de Microsoft Store para python/pip (Windows 10/11)
          Get-ChildItem "$env:LOCALAPPDATA\Microsoft\WindowsApps\python*.exe" -ErrorAction SilentlyContinue | Remove-Item -Force -ErrorAction SilentlyContinue
          Get-ChildItem "$env:LOCALAPPDATA\Microsoft\WindowsApps\pip*.exe" -ErrorAction SilentlyContinue | Remove-Item -Force -ErrorAction SilentlyContinue
          
          # Usar ruta absoluta para verificar
          $pythonPath = "C:\Program Files\Python312\python.exe"
          $pipPath = "C:\Program Files\Python312\Scripts\pip.exe"
          
          if (Test-Path $pythonPath) {
            & $pythonPath --version
          } else {
            # Buscar python en PATH
            $py = Get-Command python -ErrorAction SilentlyContinue
            if ($py) { & $py.Source --version } else { Write-Warning "Python not found in PATH" }
          }
          
          if (Test-Path $pipPath) {
            & $pipPath --version
          } else {
            # Intentar con python -m pip
            if (Test-Path $pythonPath) {
              & $pythonPath -m pip --version
            }
          }
          
          Write-Host "Python installed successfully" -ForegroundColor Green

      # ─────────────────────────────────────────────
      # 5. INSTALAR GIT
      # ─────────────────────────────────────────────
      - name: Install Git for Windows
        run: |
          Write-Host "=== Installing Git ===" -ForegroundColor Cyan
          $gitUrl = "https://github.com/git-for-windows/git/releases/download/v2.54.0.windows.1/Git-2.54.0-64-bit.exe"
          $installer = "$env:TEMP\git_installer.exe"
          
          Invoke-WebRequest -Uri $gitUrl -OutFile $installer -UseBasicParsing
          
          Start-Process $installer -ArgumentList '/VERYSILENT', '/NORESTART', '/NOCANCEL', '/SP-', '/CLOSEAPPLICATIONS', '/RESTARTAPPLICATIONS', '/COMPONENTS="icons,ext\reg\shellhere,assoc,assoc_sh"', '/o:PathOption=CmdTools', '/o:DefaultBranchOption=main' -Wait
          
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "User")
          
          git --version
          Write-Host "Git installed successfully" -ForegroundColor Green

      # ─────────────────────────────────────────────
      # 6. INSTALAR FLUTTER SDK
      # ─────────────────────────────────────────────
      - name: Install Flutter SDK
        run: |
          Write-Host "=== Installing Flutter SDK ===" -ForegroundColor Cyan
          $flutterDir = "C:\flutter"
          
          git clone -b stable --depth 1 https://github.com/flutter/flutter.git $flutterDir
          
          [Environment]::SetEnvironmentVariable("Path", $env:Path + ";$flutterDir\bin", "Machine")
          $env:Path += ";$flutterDir\bin"
          
          flutter config --no-analytics
          flutter doctor
          
          flutter --version
          Write-Host "Flutter SDK installed successfully" -ForegroundColor Green

      # ─────────────────────────────────────────────
      # 7. INSTALAR OPENCODE-AI (via npm)
      # ─────────────────────────────────────────────
      - name: Install OpenCode AI (npm global)
        run: |
          Write-Host "=== Installing OpenCode AI ===" -ForegroundColor Cyan
          
          npm --version
          
          npm install -g opencode-ai@latest
          
          # Refrescar PATH y añadir npm global bin
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "User")
          $npmPrefix = & npm config get prefix
          $npmBin = "$npmPrefix"
          if (Test-Path "$npmPrefix\bin") { $npmBin = "$npmPrefix\bin" }
          [Environment]::SetEnvironmentVariable("Path", $env:Path + ";$npmBin", "Machine")
          $env:Path += ";$npmBin"
          
          opencode --version
          Write-Host "OpenCode AI installed successfully" -ForegroundColor Green

      # ─────────────────────────────────────────────
      # 8. INSTALAR OPERA GX
      # ─────────────────────────────────────────────
      - name: Install Opera GX
        run: |
          Write-Host "=== Installing Opera GX ===" -ForegroundColor Cyan
          $operaUrl = "https://net.geo.opera.com/opera_gx/stable/windows"
          $installer = "$env:TEMP\OperaGXSetup.exe"
          
          Invoke-WebRequest -Uri $operaUrl -OutFile $installer -UseBasicParsing
          
          Start-Process $installer -ArgumentList "/silent", "/allusers=1", "/launchopera=0", "/setdefaultbrowser=0", "/desktopshortcut=0", "/enable-stats=0", "/enable-installer-stats=0" -Wait
          
          $operaPath = "${env:ProgramFiles}\Opera GX\launcher.exe"
          if (Test-Path $operaPath) {
            Write-Host "Opera GX installed at: $operaPath" -ForegroundColor Green
          } else {
            Write-Warning "Opera GX installation path not found, checking alternatives..."
            Get-ChildItem -Path "${env:ProgramFiles}" -Filter "*opera*" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 5 FullName
          }
          
          Write-Host "Opera GX installed successfully" -ForegroundColor Green

